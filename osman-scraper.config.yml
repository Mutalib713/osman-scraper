# Default config — used by `osman-scraper run` and the GitHub Actions workflow.
# See osman-scraper.config.example.yml for the full set of source/output options.

state_file: ./.osman/state.json

defaults:
  min_delay_ms: 1500
  respect_robots: true

sources:
  # CTFtime's free public API — works with no key and no browser.
  - name: ctftime
    adapter: ctftime
    config: { days: 90 }
    output:
      file: ./data/ctftime.json
      timestamp: false        # stable feed: commits only when events change

